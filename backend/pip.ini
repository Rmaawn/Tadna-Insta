; Liara Iranian PyPI mirror for fast, reliable Python installs.
;
; Use it for this project either by:
;   1) Passing the index directly:
;        pip install -r requirements.txt -i https://package-mirror.liara.ir/repository/pypi/simple/
;   2) Or pointing pip at this file for the current shell:
;        $env:PIP_CONFIG_FILE = "$PWD\pip.ini"   (PowerShell)
;   3) Or copying it to the global pip config location:
;        %APPDATA%\pip\pip.ini   (Windows)

[global]
index-url = https://package-mirror.liara.ir/repository/pypi/simple/
trusted-host = package-mirror.liara.ir
timeout = 120
retries = 8
